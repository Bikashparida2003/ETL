name: ETL pipeline

on:
  push:
    branches:
      - main


jobs:
  Extract_data_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: execute Extract_data.py
        run: python Extract_data.py


  Transform_data_job:
    runs-on: ubuntu-latest
    needs: Extract_data_job
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: execute Transform_data.py
        run: python Transform_data.py
      
  Load_data_job:
    runs-on: ubuntu-latest 
    needs: Transform_data_job
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: execute Load_data.py
        run: python Load_data.py
      - name: show python version
        run: python --version
        



